<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>محمد بغني</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --radius: 18px;
    --dur: 320ms;
  }

  [data-theme="dark"]{
    --bg: #060b08;
    --bg-glow: #0a140d;
    --surface: #0d1611;
    --surface-hover: #12201a;
    --border: rgba(74, 222, 128, 0.14);
    --border-strong: rgba(74, 222, 128, 0.32);
    --text: #eef7f0;
    --text-dim: #85a08e;
    --text-faint: #4c6355;
    --accent: #35d17d;
    --accent-strong: #6ff0a6;
    --accent-ink: #04140a;
    --node: #2f6b48;
    --shadow: 0 20px 60px -20px rgba(0,0,0,0.7);
  }

  [data-theme="light"]{
    --bg: #f6faf7;
    --bg-glow: #eef6f0;
    --surface: #ffffff;
    --surface-hover: #f0f7f2;
    --border: rgba(22, 101, 52, 0.14);
    --border-strong: rgba(22, 101, 52, 0.30);
    --text: #0e1b13;
    --text-dim: #4b5f52;
    --text-faint: #93a89a;
    --accent: #16a34a;
    --accent-strong: #0f7a38;
    --accent-ink: #ffffff;
    --node: #a9d3b7;
    --shadow: 0 20px 60px -24px rgba(16, 60, 32, 0.25);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0; min-height:100%;
    background: radial-gradient(120% 100% at 50% -10%, var(--bg-glow), var(--bg) 55%);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    transition: background var(--dur) ease, color var(--dur) ease;
    overflow-x: hidden;
  }

  #net-canvas{
    position: fixed; inset: 0; width: 100%; height: 100%;
    z-index: 0; opacity: .55; pointer-events: none;
  }

  .wrap{
    position: relative; z-index: 1;
    max-width: 460px; margin: 0 auto;
    min-height: 100vh;
    padding: 18px 18px 40px;
    display: flex; flex-direction: column;
  }

  /* Top bar */
  .topbar{
    display:flex; align-items:center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .brand-mark{
    display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: .12em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .brand-mark .dot{
    width:7px; height:7px; border-radius:50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent);
  }

  .controls{ display:flex; gap:8px; }
  .pill-btn{
    display:flex; align-items:center; gap:6px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    padding: 7px 11px; border-radius: 999px;
    cursor: pointer; transition: all var(--dur) ease;
  }
  .pill-btn:hover{ border-color: var(--border-strong); color: var(--text); background: var(--surface-hover); }
  .pill-btn svg{ width:13px; height:13px; }

  /* Hero */
  .hero{
    display:flex; flex-direction:column; align-items:center;
    text-align:center;
    padding: 26px 4px 8px;
  }

  .photo-frame{
    position: relative;
    width: 132px; height: 132px;
    margin-bottom: 18px;
  }
  .photo-frame svg.ring{
    position:absolute; inset:-9px; width:150px; height:150px;
    animation: spin 26s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .photo-frame img{
    width:100%; height:100%; object-fit: cover; object-position: 50% 22%;
    clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
    background: var(--surface);
    border: none;
  }
  .photo-frame .photo-clip-border{
    position:absolute; inset:0;
    clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
    box-shadow: inset 0 0 0 2px var(--border-strong);
    pointer-events:none;
  }

  .name{
    font-size: 27px; font-weight: 800; letter-spacing: -0.01em;
    margin: 0 0 6px;
  }
  .role{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px; color: var(--accent);
    letter-spacing: .03em;
    margin: 0 0 4px;
  }
  .org{
    font-size: 13.5px; color: var(--text-dim);
    margin: 0; max-width: 300px; line-height: 1.5;
  }

  /* Network section */
  .section-label{
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase;
    color: var(--text-faint);
    margin: 26px 2px 10px;
  }

  .graph{
    position: relative;
    display:flex; flex-direction: column;
  }
  .node-row{
    position: relative;
    display:flex; align-items:center; gap:13px;
    padding: 13px 4px;
    text-decoration:none; color: inherit;
    border-radius: 12px;
    transition: background var(--dur) ease, transform var(--dur) ease;
  }
  .node-row:active{ transform: scale(0.985); }
  .node-row:hover{ background: var(--surface-hover); }

  .node-track{
    position: relative;
    width: 14px; align-self: stretch;
    display:flex; justify-content:center; flex-shrink:0;
  }
  .node-track::before{
    content:''; position:absolute; top:-13px; bottom:-13px; width:1px;
    background: var(--border);
  }
  .node-row:first-child .node-track::before{ top: 50%; }
  .node-row:last-child .node-track::before{ bottom: 50%; }
  .node-dot{
    position: relative; z-index:1;
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    margin-top: auto; margin-bottom: auto;
  }

  .node-icon{
    flex-shrink:0;
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    color: var(--text);
    transition: border-color var(--dur) ease;
  }
  .node-row:hover .node-icon{ border-color: var(--border-strong); }
  .node-icon svg{ width:18px; height:18px; }

  .node-body{ flex:1; min-width:0; }
  .node-label{
    font-size: 10.5px; color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .06em; text-transform: uppercase;
    margin-bottom: 2px;
  }
  .node-value{
    font-size: 14.5px; font-weight: 600;
    white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
    direction: ltr; text-align: right;
    font-family: 'JetBrains Mono', monospace;
  }
  [dir="rtl"] .node-value{ text-align: right; }
  [dir="ltr"] .node-value{ text-align: left; }

  .node-go{
    flex-shrink:0; color: var(--text-faint);
    width:16px; height:16px;
  }
  [dir="rtl"] .node-go{ transform: scaleX(-1); }

  /* CTA */
  .cta{
    margin-top: 28px;
    width: 100%;
    display:flex; align-items:center; justify-content:center; gap:10px;
    background: var(--accent);
    color: var(--accent-ink);
    border: none;
    padding: 16px 20px;
    border-radius: 14px;
    font-family:'Cairo', sans-serif;
    font-size: 15.5px; font-weight: 700;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: transform var(--dur) ease, filter var(--dur) ease;
  }
  .cta:hover{ filter: brightness(1.06); }
  .cta:active{ transform: scale(0.98); }
  .cta svg{ width:18px; height:18px; }

  .foot{
    text-align:center; margin-top: 22px;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: .08em;
    color: var(--text-faint);
  }

  @media (prefers-reduced-motion: reduce){
    .photo-frame svg.ring{ animation: none; }
    #net-canvas{ display:none; }
  }
</style>
</head>

// ---------- Network background ----------
const canvas = document.getElementById('net-canvas');
const ctx = canvas.getContext('2d');
let w, h, pts;
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
function initPoints(){
  const count = Math.min(46, Math.floor((w*h)/26000));
  pts = Array.from({length: count}, () => ({
    x: Math.random()*w, y: Math.random()*h,
    vx: (Math.random()-0.5)*0.18, vy: (Math.random()-0.5)*0.18
  }));
}
function accentColor(){
  return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#35d17d';
}
function draw(){
  ctx.clearRect(0,0,w,h);
  const col = accentColor();
  for(const p of pts){
    p.x += p.vx; p.y += p.vy;
    if(p.x < 0 || p.x > w) p.vx *= -1;
    if(p.y < 0 || p.y > h) p.vy *= -1;
  }
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 130){
        ctx.strokeStyle = col;
        ctx.globalAlpha = (1 - dist/130) * 0.16;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pts[i].x, pts[i].y);
        ctx.lineTo(pts[j].x, pts[j].y);
        ctx.stroke();
      }
    }
  }
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = col;
  for(const p of pts){
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  if(!reduceMotion) requestAnimationFrame(draw);
}

resize();
initPoints();
window.addEventListener('resize', () => { resize(); initPoints(); });
draw();
